pipeline:
  name: soch-shop-dev
  identifier: sochshopdev
  projectIdentifier: OKD415
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: SonarQube Code Analysis
        identifier: SonarQube_Code_Analysis
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: okd514devconnector
              namespace: sock-shop-dev
              serviceAccountName: harness-vault-sa
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run SonarQube Scan
                  identifier: Run_SonarQube_Scan
                  spec:
                    connectorRef: Docker_registry
                    image: sonarsource/sonar-scanner-cli:latest
                    shell: Sh
                    command: |-
                      set -eu

                      VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
                      SONAR_HOST_URL="http://sonarqube.sonarqube.svc.cluster.local:9000"
                      SA_TOKEN_FILE="/var/run/secrets/kubernetes.io/serviceaccount/token"

                      echo "Checking service-account token..."
                      test -r "$SA_TOKEN_FILE"

                      JWT="$(cat "$SA_TOKEN_FILE")"

                      echo "Authenticating to Vault..."
                      LOGIN_RESPONSE="$(curl -fsS \
                        --request POST \
                        --header "Content-Type: application/json" \
                        --data "{\"role\":\"harness-sonarqube\",\"jwt\":\"$JWT\"}" \
                        "$VAULT_ADDR/v1/auth/kubernetes/login")"

                      VAULT_TOKEN="$(printf '%s' "$LOGIN_RESPONSE" |
                        sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')"

                      test -n "$VAULT_TOKEN"

                      echo "Reading SonarQube token from Vault..."
                      SECRET_RESPONSE="$(curl -fsS \
                        --header "X-Vault-Token: $VAULT_TOKEN" \
                        "$VAULT_ADDR/v1/secret/data/sonarqube")"

                      SONAR_TOKEN="$(printf '%s' "$SECRET_RESPONSE" |
                        sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"

                      test -n "$SONAR_TOKEN"

                      export SONAR_HOST_URL
                      export SONAR_TOKEN

                      echo "Starting SonarQube analysis from: $(pwd)"

                      export SONAR_USER_HOME=/tmp/.sonar
                      mkdir -p "$SONAR_USER_HOME"

                      sonar-scanner \
                        -Dsonar.projectKey=sock-shop-dev \
                        -Dsonar.projectName=sock-shop-dev \
                        -Dsonar.sources=. \
                        -Dsonar.projectBaseDir="$(pwd)"

                      echo "SonarQube analysis completed."
    - stage:
        name: sock-shop-dev-app
        identifier: sockshopdevapp
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: shockshopdev
          environment:
            environmentRef: sockshopdev
            gitBranch: master
            deployToAll: false
            infrastructureDefinitions:
              - identifier: sochshodevinfra
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Test Vault Access from Delegate
                  identifier: Test_Vault_Access_from_Delegate
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          set -euo pipefail
                          set +x

                          VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
                          JWT="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"

                          LOGIN_RESPONSE="$(curl --silent --show-error --fail \
                            --request POST \
                            --header "Content-Type: application/json" \
                            --data "{\"role\":\"harness-sonarqube\",\"jwt\":\"${JWT}\"}" \
                            "${VAULT_ADDR}/v1/auth/kubernetes/login")"

                          VAULT_CLIENT_TOKEN="$(printf '%s' "${LOGIN_RESPONSE}" |
                            sed -n 's/.*"client_token":"\([^"]*\)".*/\1/p')"

                          if [ -z "${VAULT_CLIENT_TOKEN}" ]; then
                            echo "ERROR: Vault authentication did not return a client token."
                            exit 1
                          fi

                          SECRET_RESPONSE="$(curl --silent --show-error --fail \
                            --header "X-Vault-Token: ${VAULT_CLIENT_TOKEN}" \
                            "${VAULT_ADDR}/v1/secret/data/sonarqube")"

                          SONAR_TOKEN="$(printf '%s' "${SECRET_RESPONSE}" |
                            sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"

                          if [ "${#SONAR_TOKEN}" -ne 44 ] || [ "${SONAR_TOKEN:0:4}" != "sqp_" ]; then
                            echo "ERROR: Retrieved SonarQube token is not valid."
                            exit 1
                          fi

                          echo "Vault authentication succeeded."
                          echo "SonarQube token retrieved successfully."

                          unset JWT LOGIN_RESPONSE VAULT_CLIENT_TOKEN SECRET_RESPONSE SONAR_TOKEN
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  properties:
    ci:
      codebase:
        connectorRef: sockshopdevgitconnector
        build: <+input>
